<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>오프라인 — 건물우수 MANMIN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#0c4da2 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:#fff;padding:24px;
}
.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(191,219,254,.25);
  border-radius:24px;
  padding:48px 36px;
  text-align:center;
  max-width:420px;width:100%;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.icon{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:22px;font-weight:900;margin-bottom:8px;color:#eff6ff;}
p{font-size:14px;color:#93c5fd;line-height:1.7;margin-bottom:28px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  color:#fff;border:none;padding:13px 28px;
  border-radius:12px;font-size:15px;font-weight:800;
  cursor:pointer;text-decoration:none;
  transition:all .2s;box-shadow:0 4px 18px rgba(249,115,22,.4);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(249,115,22,.6);}
.status{
  margin-top:24px;font-size:11px;color:rgba(147,197,253,.6);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:#ef4444;animation:blink 1.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>네트워크 연결 없음</h1>
  <p>
    인터넷 연결을 확인해주세요.<br/>
    연결 후 다시 시도하면 계속 사용할 수 있습니다.
  </p>
  <a href="./index.html" class="btn" onclick="location.reload();return false;">
    🔄 다시 시도
  </a>
  <div class="status">
    <div class="dot"></div>
    오프라인 모드
  </div>
</div>
<script>
window.addEventListener('online', () => {
  location.replace('./index.html');
});
</script>
</body>
</html>
