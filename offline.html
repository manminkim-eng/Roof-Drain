<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오프라인 — 건물우수</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:#fff;padding:20px;
}
.box{
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
  padding:40px 32px;
  max-width:380px;
  width:100%;
  text-align:center;
}
.ico{font-size:64px;margin-bottom:16px;}
h1{font-size:22px;font-weight:900;margin-bottom:8px;}
p{font-size:13px;opacity:.75;line-height:1.7;margin-bottom:24px;}
button{
  background:#fbbf24;color:#1a1a1a;
  border:none;padding:12px 28px;
  border-radius:10px;font-size:14px;font-weight:800;
  cursor:pointer;transition:opacity .15s;
  font-family:inherit;
}
button:hover{opacity:.85;}
</style>
</head>
<body>
<div class="box">
  <div class="ico">📡</div>
  <h1>오프라인 상태입니다</h1>
  <p>인터넷 연결이 없습니다.<br>연결 후 다시 시도해 주세요.<br><br>앱을 이미 로드한 적이 있다면<br>캐시 버전으로 자동 열립니다.</p>
  <button onclick="location.reload()">🔄 다시 시도</button>
</div>
</body>
</html>
